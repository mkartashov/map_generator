[tox]
envlist = py313, lint, type, run

[flake8]
max-line-length = 120

[testenv]
basepython = python3.13
usedevelop = true

[testenv:test]
usedevelop = true
description = run unit tests with pytest
deps =
    pytest
    pytest-cov
commands =
    pytest --cov=core --cov=engine --cov=layers --cov=renderer --cov-report=term-missing --cov-report=html tests

[testenv:lint]
description = check code style with flake8
deps =
    flake8
commands =
    flake8 core engine layers renderer

[testenv:type]
description = run mypy type checks
deps =
    mypy
commands =
    mypy core engine layers renderer --strict --ignore-missing-imports

[testenv:run]
description = run the hexmap CLI
commands =
    python -m cli {posargs}